# Generate
# Deploy Pipeline — Build and deploy to Azure Static Web Apps
name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all projects (production)
        run: npx nx run-many --target=build --all --configuration=production --parallel=3

      # Shell Application
      - name: Deploy Shell to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_SHELL_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/apps/shell
          skip_app_build: true

      # Risk Assessment Remote
      - name: Deploy Risk Assessment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_RISK_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/apps/risk-assessment
          skip_app_build: true

      # Compliance Dashboard Remote
      - name: Deploy Compliance Dashboard
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_COMPLIANCE_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/apps/compliance-dashboard
          skip_app_build: true

      # Audit Management Remote
      - name: Deploy Audit Management
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_AUDIT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/apps/audit-management
          skip_app_build: true

      # Policy Management Remote
      - name: Deploy Policy Management
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_POLICY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/apps/policy-management
          skip_app_build: true

      # Incident Reporting Remote
      - name: Deploy Incident Reporting
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_INCIDENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/apps/incident-reporting
          skip_app_build: true

      # Vendor Risk Remote
      - name: Deploy Vendor Risk
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_VENDOR_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/apps/vendor-risk
          skip_app_build: true

      # Partner Onboarding Remote
      - name: Deploy Partner Onboarding
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_ONBOARDING_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/apps/partner-onboarding
          skip_app_build: true
