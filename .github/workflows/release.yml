# Generated by GitHub Copilot
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint all projects
        run: npx nx run-many --target=lint --all --parallel=3

      - name: Run tests
        run: npm test

      - name: Build all projects (production)
        run: npx nx run-many --target=build --all --configuration=production --parallel=3

      - name: Dependency audit (non-blocking)
        run: npm audit --omit=dev --audit-level=high || true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: partner-portal-dist
          path: dist/apps/**
