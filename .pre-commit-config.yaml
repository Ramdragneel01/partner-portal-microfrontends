# Generated by GitHub Copilot
repos:
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.1.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key

  - repo: local
    hooks:
      - id: lint-and-type-check
        name: Run linting and type checking
        entry: bash ./scripts/lint/run-checks.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
      - id: detect-secrets-basic
        name: Detect basic secrets patterns
        entry: bash ./scripts/security/detect-secrets-basic.sh
        language: system
        pass_filenames: true
        files: '(^|/)\.env(\..*)?$|\.ya?ml$'
